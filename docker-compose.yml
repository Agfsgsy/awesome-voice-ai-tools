version: '3.8'

services:

  voice-launcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-ai-launcher
    ports:
      - "7860:7860"
    volumes:
      - ./outputs:/app/outputs
      - ./reference_audio:/app/reference_audio
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
