version: "3.8"

services:
  voice-ai:
    build: .
    ports:
      - "7860:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./outputs:/app/outputs
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./models:/app/models
      - ./voices:/app/voices
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_TTS_MODEL=${GEMINI_TTS_MODEL:-gemini-3.1-flash-tts-preview}
    restart: unless-stopped
